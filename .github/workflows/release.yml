name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          exe="autoskill-md"
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            exe="autoskill-md.exe"
          fi
          mkdir -p dist/package
          cp "target/${{ matrix.target }}/release/$exe" "dist/package/$exe"
          tar -czf "dist/autoskill-md-${{ matrix.target }}.tar.gz" -C dist/package "$exe"

      - uses: actions/upload-artifact@v4
        with:
          name: autoskill-md-${{ matrix.target }}
          path: dist/*.tar.gz

  release:
    name: publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.tar.gz \
            --repo "$GITHUB_REPOSITORY" \
            --title "autoskill-md $GITHUB_REF_NAME" \
            --notes "Native autoskill-md release. Credit: https://colinknapp.com. Spec: https://colinknapp.com/specs/skill-discovery.html." \
          || gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz --repo "$GITHUB_REPOSITORY" --clobber
